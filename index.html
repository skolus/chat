<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: rgba(255,255,255,0.04);
    --surface-strong: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.07);
    --text: #c8cdd6;
    --text-bright: #dde2ec;
    --muted: #5a6070;
    --accent: #b39ddb;
    --accent-dim: rgba(179,157,219,0.15);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  #rain { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  #splashes { position: fixed; inset: 0; pointer-events: none; z-index: 2; }

  .screen {
    position: relative;
    z-index: 1;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }
  .hidden { display: none !important; }

  .card {
    width: 100%;
    max-width: 420px;
    opacity: 0;
    transform: translateY(-20px);
    animation: rise 0.9s cubic-bezier(0.215,0.61,0.355,1) forwards;
  }

  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .heading {
    font-size: clamp(1.6rem, 5vw, 2.1rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text-bright);
    margin-bottom: 0.2em;
  }
  .heading .accent-word { color: var(--accent); font-weight: 500; }

  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; letter-spacing: 0.01em; }
  .section-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }

  .code-pill {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6em 0.9em;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 0.9rem;
    transition: border-color 0.18s, background 0.18s;
  }
  .code-pill span { font-size: 1.05rem; letter-spacing: 0.14em; color: var(--accent); font-weight: 400; }

  .pill-btn {
    display: inline-flex; align-items: center; gap: 0.35em; padding: 0.3em 0.85em;
    border-radius: 999px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-family: inherit; font-size: 0.78rem; cursor: pointer;
    transition: border-color 0.18s, color 0.18s, background 0.18s;
  }
  .pill-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  button.wide {
    width: 100%; display: block; text-align: center; padding: 0.65em 1em; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: border-color 0.18s, color 0.18s, background 0.18s;
  }
  button.wide:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  button.wide:disabled { opacity: 0.4; cursor: default; }

  .divider {
    display: flex; align-items: center; gap: 0.9em; margin: 1.8rem 0;
    color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  input[type="text"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 0.9rem; padding: 0.65em 0.9em; border-radius: 12px;
    outline: none; margin-bottom: 0.9rem; transition: border-color 0.18s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .status-line { margin-top: 1.1rem; font-size: 0.8rem; color: var(--muted); min-height: 1.2em; }
  .status-line.error { color: #d68fa0; }
  .status-line.ok { color: var(--accent); }

  .clock-row { display: flex; align-items: center; gap: 0.5em; }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    flex-shrink: 0; transition: background 0.3s;
  }
  .status-dot.live { background: var(--accent); animation: pulse 2.4s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.8); }
  }

  #chatScreen { flex-direction: column; align-items: stretch; justify-content: stretch; padding: 0; }

  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.6rem; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02); font-size: 0.82rem;
  }
  .chat-header .room-tag { color: var(--muted); }
  .chat-header .room-tag b { color: var(--accent); font-weight: 500; letter-spacing: 0.08em; }

  #messages {
    flex: 1; overflow-y: auto; padding: 1.5rem 1.6rem;
    display: flex; flex-direction: column; gap: 0.4rem;
  }

  .msg-container { display: flex; flex-direction: column; margin-bottom: 0.3rem; }
  .msg-container.me { align-items: flex-end; }
  .msg-container.them { align-items: flex-start; }
  .msg-container.system { align-items: center; margin: 0.8rem 0; }

  .timestamp { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.2rem; margin-inline: 0.4rem; }

  .msg {
    max-width: 75%; padding: 0.55em 0.85em; border-radius: 14px;
    font-size: 0.88rem; line-height: 1.5; word-wrap: break-word;
    opacity: 0; animation: msgIn 0.25s ease forwards;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.me { background: var(--accent-dim); border: 1px solid rgba(179,157,219,0.3); color: var(--text-bright); border-bottom-right-radius: 4px; }
  .msg.them { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.system { color: var(--muted); font-size: 0.75rem; background: none; border: none; letter-spacing: 0.03em; max-width: 100%; text-align: center; }

  /* Markdown & Media styling */
  .msg { white-space: pre-wrap; }
  .msg b { font-weight: 500; color: #fff; }
  .msg i { font-style: italic; opacity: 0.9; }
  .msg img, .msg video {
    max-width: 100%;
    max-height: 280px; /* Caps the height so it doesn't take over the screen */
    width: auto;       /* Ensures the aspect ratio doesn't stretch */
    border-radius: 8px;
    margin-top: 4px;
    display: block;
    background: #000;
  }
  .msg audio { max-width: 100%; margin-top: 4px; display: block; outline: none; border-radius: 8px; }
  .msg a { color: var(--accent); text-decoration: underline; word-break: break-all; }
  .msg.system { white-space: normal; }
  .file-caption { margin-top: 0.35em; }

  /* Reply quoting */
  .reply-quote {
    font-size: 0.75rem; color: var(--muted); border-left: 2px solid var(--accent);
    padding-left: 0.5em; margin-bottom: 0.35em; cursor: pointer; opacity: 0.85;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
  }
  .reply-quote:hover { color: var(--accent); }

  .msg-highlight .msg { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Bubble row: message + hover actions */
  .bubble-row { display: flex; align-items: flex-end; gap: 0.15rem; max-width: 100%; }
  .msg-container.me .bubble-row { flex-direction: row-reverse; }
  .msg-container.them .bubble-row { flex-direction: row; }

  .msg-actions { display: flex; gap: 0.05rem; opacity: 0.55; flex-shrink: 0; position: relative; }
  @media (hover: hover) {
    .msg-actions { opacity: 0.3; transition: opacity 0.15s; }
    .msg-container:hover .msg-actions { opacity: 0.9; }
  }
  .msg-actions button {
    background: none; border: none; color: var(--muted); font-size: 0.9rem; cursor: pointer;
    padding: 0.3rem; border-radius: 8px; line-height: 1; min-width: 30px; min-height: 30px;
  }
  .msg-actions button:hover, .msg-actions button:active { color: var(--accent); background: var(--accent-dim); }

  .react-wrap { position: relative; }
  .emoji-picker {
    position: absolute; bottom: calc(100% + 6px); display: none; gap: 0.1rem; padding: 0.35rem;
    background: #12141b; border: 1px solid var(--border); border-radius: 12px; z-index: 10;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4); white-space: nowrap;
  }
  .msg-container.me .emoji-picker { right: 0; }
  .msg-container.them .emoji-picker { left: 0; }
  .emoji-picker.open { display: flex; }
  .emoji-picker button {
    background: none; border: none; font-size: 1.05rem; padding: 0.3rem; cursor: pointer;
    border-radius: 8px; min-width: 34px; min-height: 34px;
  }
  .emoji-picker button:hover { background: var(--accent-dim); }

  /* Reactions */
  .msg-reactions { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.2rem; margin-inline: 0.3rem; }
  .msg-container.me .msg-reactions { justify-content: flex-end; }
  .reaction-pill {
    font-size: 0.72rem; padding: 0.15em 0.55em; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; line-height: 1.5;
  }
  .reaction-pill.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  /* Reply bar above input */
  .reply-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
    padding: 0.5rem 1.6rem; background: rgba(255,255,255,0.03); border-top: 1px solid var(--border);
    font-size: 0.78rem;
  }
  .reply-bar-content { display: flex; flex-direction: column; overflow: hidden; }
  .reply-bar-label { color: var(--accent); font-size: 0.68rem; letter-spacing: 0.03em; }
  .reply-bar-text { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw; }

  /* File preview modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(5,6,10,0.72); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 20; padding: 1.5rem;
  }
  .modal-card {
    width: 100%; max-width: 420px; background: #12141b; border: 1px solid var(--border);
    border-radius: 16px; padding: 1.2rem; display: flex; flex-direction: column; gap: 0.8rem;
  }
  .modal-title { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.05em; }
  .modal-preview {
    max-height: 340px; overflow: hidden; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; background: rgba(255,255,255,0.02);
  }
  .modal-preview img, .modal-preview video { max-width: 100%; max-height: 340px; display: block; border-radius: 10px; }
  .modal-preview audio { width: 100%; }
  .file-chip { padding: 0.9em 1em; border: 1px solid var(--border); border-radius: 10px; font-size: 0.85rem; color: var(--text-bright); width: 100%; text-align: center; }
  #modalCaption {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 0.88rem; padding: 0.6em 0.9em; border-radius: 12px; outline: none;
    resize: none; min-height: 2.6em; max-height: 100px; transition: border-color 0.18s;
  }
  #modalCaption:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
  #modalSendBtn {
    padding: 0.55em 1.2em; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface); color: var(--accent); font-family: inherit; font-size: 0.85rem;
    cursor: pointer; transition: border-color 0.18s, background 0.18s; min-height: 40px;
  }
  #modalSendBtn:hover { border-color: var(--accent); background: var(--accent-dim); }
  #modalSendBtn:disabled { opacity: 0.5; cursor: default; }

  .input-bar {
    display: flex; align-items: flex-end; gap: 0.6rem; padding: 1.1rem 1.6rem;
    padding-bottom: calc(1.1rem + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border); background: rgba(255,255,255,0.02);
  }

  .attach-btn {
    background: none; border: none; color: var(--muted); font-size: 1.4rem;
    cursor: pointer; transition: color 0.18s; padding: 0.4rem 0.5rem;
    min-width: 40px; min-height: 40px;
  }
  .attach-btn:hover { color: var(--text-bright); }
  .attach-btn:disabled { opacity: 0.4; cursor: default; }

  .input-bar input[type="text"] { flex: 1; margin-bottom: 0; }
  .input-bar textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 0.9rem; padding: 0.65em 0.9em; border-radius: 16px;
    outline: none; resize: none; max-height: 140px; line-height: 1.4;
    transition: border-color 0.18s;
  }
  .input-bar textarea:focus { border-color: var(--accent); }
  .input-bar textarea::placeholder { color: var(--muted); }
  .input-bar textarea:disabled { opacity: 0.5; }

  .input-bar button:not(.attach-btn) {
    padding: 0.6em 1.3em; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface); color: var(--accent); font-family: inherit; font-size: 0.85rem;
    cursor: pointer; transition: border-color 0.18s, background 0.18s; white-space: nowrap;
    min-height: 40px;
  }
  .input-bar button:not(.attach-btn):hover { border-color: var(--accent); background: var(--accent-dim); }

  /* Typing Indicator */
  #typingIndicator { margin-bottom: 0.4rem; padding-left: 0.5rem; }
  .typing-dots { color: var(--muted); font-size: 1.2rem; line-height: 1; }
  .dot { animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  #messages { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }

  @media (max-width: 600px) {
    .screen { padding: 1.5rem 1.2rem; }
    .chat-header {
      padding: 0.9rem 1.1rem;
      padding-top: calc(0.9rem + env(safe-area-inset-top));
    }
    #messages { padding: 1rem 0.9rem; }
    .input-bar { padding: 0.85rem 0.9rem; padding-bottom: calc(0.85rem + env(safe-area-inset-bottom)); gap: 0.45rem; }
    .reply-bar { padding: 0.5rem 0.9rem; }
    .msg { max-width: 85%; font-size: 0.9rem; }
    /* 16px prevents iOS Safari from auto-zooming the page on focus */
    .input-bar textarea, .input-bar input[type="text"], #modalCaption { font-size: 16px; }
    .modal-card { max-width: 100%; }
    .reply-bar-text { max-width: 50vw; }
  }
</style>
</head>
<body>

<canvas id="rain"></canvas>
<canvas id="splashes"></canvas>

<div class="screen" id="entryScreen">
  <div class="card">
    <h1 class="heading">say <span class="accent-word">something</span></h1>
    <p class="sub">peer-to-peer, nothing saved, no accounts</p>

    <p class="section-label">your code</p>
    <div class="code-pill">
      <span id="myCode">------</span>
      <button class="pill-btn" id="copyBtn">copy</button>
    </div>

    <div class="divider">or</div>

    <p class="section-label">join a code</p>
    <input type="text" id="joinInput" placeholder="enter code" autocomplete="off" maxlength="8">
    <button class="wide" id="joinBtn">join</button>

    <div class="status-line" id="status"></div>
  </div>
</div>

<div class="screen hidden" id="chatScreen">
  <div class="chat-header">
    <div class="clock-row">
      <div class="status-dot" id="connDot"></div>
      <span class="room-tag">room <b id="roomLabel"></b></span>
    </div>
    <button class="pill-btn" id="leaveBtn">leave</button>
  </div>

  <div id="messages">
    <!-- Messages appended here -->
    <div id="typingIndicator" class="msg-container them hidden">
       <div class="typing-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
  </div>

  <div class="reply-bar hidden" id="replyBar">
    <div class="reply-bar-content">
      <span class="reply-bar-label" id="replyBarLabel"></span>
      <span class="reply-bar-text" id="replyBarText"></span>
    </div>
    <button class="pill-btn" id="replyBarClose">✕</button>
  </div>

  <div class="input-bar">
    <input type="file" id="fileInput" style="display:none">
    <button class="attach-btn" id="attachBtn" title="Send a file up to 10MB">＋</button>
    <textarea id="msgInput" placeholder="type a message..." autocomplete="off" rows="1"></textarea>
    <button id="sendBtn">send</button>
  </div>
</div>

<div class="modal-overlay hidden" id="fileModalOverlay">
  <div class="modal-card">
    <div class="modal-title">sending a file</div>
    <div class="modal-preview" id="modalPreview"></div>
    <textarea id="modalCaption" placeholder="add a message... (optional)" rows="1"></textarea>
    <div class="modal-actions">
      <button class="pill-btn" id="modalCancelBtn">cancel</button>
      <button id="modalSendBtn">send</button>
    </div>
  </div>
</div>

<script>
// --- Canvas Animations ---
(function() {
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  let drops = [];
  let animId;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initDrops();
  }

  function initDrops() {
    drops = [];
    const count = Math.floor((canvas.width * canvas.height) / 6000);
    for (let i = 0; i < count; i++) drops.push(newDrop(true));
  }

  function newDrop(randomY) {
    return {
      x: Math.random() * canvas.width,
      y: randomY ? Math.random() * canvas.height : -20,
      len: Math.random() * 18 + 10,
      speed: Math.random() * 7 + 10,
      opacity: Math.random() * 0.4 + 0.15,
      width: Math.random() * 0.8 + 0.4,
      vx: 0,
    };
  }

  let mouse = { x: -9999, y: -9999 };
  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

  const MOUSE_RADIUS = 110, PUSH_STRENGTH = 6, RETURN_EASE = 0.08;

  function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < drops.length; i++) {
      const d = drops[i];
      const dx = d.x - mouse.x, dy = d.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_RADIUS && dist > 0) {
        const influence = (1 - dist / MOUSE_RADIUS);
        d.vx += (dx / dist) * influence * PUSH_STRENGTH;
      }
      d.vx = Math.max(-18, Math.min(18, d.vx));
      d.vx *= (1 - RETURN_EASE);

      d.x += d.speed * 0.18 + d.vx;
      d.y += d.speed;

      const tiltX = d.len * 0.18 + d.vx * 1.5;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + tiltX, d.y + d.len);
      ctx.strokeStyle = `rgba(160,185,230,${d.opacity})`;
      ctx.lineWidth = d.width;
      ctx.stroke();

      if (d.y > canvas.height + d.len || d.x > canvas.width + d.len) {
        drops[i] = newDrop(false);
        drops[i].x = Math.random() * canvas.width;
      }
    }
    animId = requestAnimationFrame(drawRain);
  }

  resize();
  drawRain();
  window.addEventListener('resize', () => {
    cancelAnimationFrame(animId);
    resize();
    drawRain();
  });
})();

(function() {
  const canvas = document.getElementById('splashes');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function spawn(x, y) {
    const count = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 1,
        size: Math.random() * 2.2 + 0.7,
      });
    }
  }

  window.addEventListener('click', (e) => {
    spawn(e.clientX, e.clientY);
  });

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.life -= 0.045;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(160,185,230,${p.life * 0.7})`;
      ctx.fill();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// --- Chat Logic ---
let peer = null;
let conn = null;
let myRoomCode = null;

const entryScreen = document.getElementById('entryScreen');
const chatScreen = document.getElementById('chatScreen');
const myCodeEl = document.getElementById('myCode');
const statusEl = document.getElementById('status');
const joinBtn = document.getElementById('joinBtn');
const joinInput = document.getElementById('joinInput');
const copyBtn = document.getElementById('copyBtn');
const roomLabel = document.getElementById('roomLabel');
const connDot = document.getElementById('connDot');
const messagesEl = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const leaveBtn = document.getElementById('leaveBtn');
const typingIndicator = document.getElementById('typingIndicator');
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');
const replyBar = document.getElementById('replyBar');
const replyBarLabel = document.getElementById('replyBarLabel');
const replyBarText = document.getElementById('replyBarText');
const replyBarClose = document.getElementById('replyBarClose');
const fileModalOverlay = document.getElementById('fileModalOverlay');
const modalPreview = document.getElementById('modalPreview');
const modalCaption = document.getElementById('modalCaption');
const modalCancelBtn = document.getElementById('modalCancelBtn');
const modalSendBtn = document.getElementById('modalSendBtn');

const PEER_PREFIX = 'lofichat-';
const REACT_EMOJIS = ['👍', '❤️', '😂', '😮', '😢', '🔥'];
let lastMsgMinute = -1;
let typingTimeout = null;
let replyTarget = null;
let pendingFile = null;
const messageRegistry = new Map(); // msgId -> { container, reactions: {emoji: Set('me'|'them')}, reactionsEl }

// --- Audio Synthesizer (No files needed) ---
let audioCtx;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('keydown', initAudio, { once: true });

function playSoftBeep() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.03);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.35);
}

// --- Helpers ---
function randomCode(len = 6) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

function setStatus(msg, type) {
  statusEl.textContent = msg || '';
  statusEl.className = 'status-line' + (type ? ' ' + type : '');
}

function escapeHTML(str) {
  return str.replace(/[&<>'"]/g, tag => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  }[tag]));
}

function parseMarkdown(str) {
  let html = escapeHTML(str);
  html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); // Bold
  html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');     // Italic
  return html; // newlines are preserved as-is; .msg uses white-space: pre-wrap
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function labelForFile(category) {
  if (category === 'image') return '📷 photo';
  if (category === 'video') return '🎞 video';
  if (category === 'audio') return '🎵 audio';
  return '📎 file';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// --- Reply targeting ---
function setReplyTarget(id, who, snippet) {
  replyTarget = { id, who, snippet };
  replyBarLabel.textContent = 'replying to ' + (who === 'me' ? 'yourself' : 'them');
  replyBarText.textContent = snippet;
  replyBar.classList.remove('hidden');
  msgInput.focus();
}

function clearReplyTarget() {
  replyTarget = null;
  replyBar.classList.add('hidden');
}

function jumpToMessage(id) {
  const entry = messageRegistry.get(id);
  if (!entry) return;
  entry.container.scrollIntoView({ behavior: 'smooth', block: 'center' });
  entry.container.classList.add('msg-highlight');
  setTimeout(() => entry.container.classList.remove('msg-highlight'), 1200);
}

// --- Reactions ---
function closeAllPickers() {
  document.querySelectorAll('.emoji-picker.open').forEach(p => p.classList.remove('open'));
}
document.addEventListener('click', closeAllPickers);

function toggleReaction(msgId, emoji, sender, shouldSend = true) {
  const entry = messageRegistry.get(msgId);
  if (!entry) return; // message no longer tracked (e.g. very old scrollback)
  if (!entry.reactions[emoji]) entry.reactions[emoji] = new Set();
  const set = entry.reactions[emoji];
  if (set.has(sender)) set.delete(sender); else set.add(sender);
  if (set.size === 0) delete entry.reactions[emoji];
  renderReactions(msgId);
  if (shouldSend && conn && conn.open) {
    try { conn.send({ type: 'reaction', msgId, emoji }); } catch (e) {}
  }
}

function renderReactions(msgId) {
  const entry = messageRegistry.get(msgId);
  if (!entry) return;
  const container = entry.reactionsEl;
  container.innerHTML = '';
  Object.entries(entry.reactions).forEach(([emoji, set]) => {
    if (!set.size) return;
    const pill = document.createElement('button');
    pill.className = 'reaction-pill' + (set.has('me') ? ' active' : '');
    pill.textContent = emoji + (set.size > 1 ? ' ' + set.size : '');
    pill.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReaction(msgId, emoji, 'me');
    });
    container.appendChild(pill);
  });
}

// --- File preview modal ---
function openFileModal(file) {
  if (file.size > 10 * 1024 * 1024) {
    alert('File is too large. Please select a file under 10MB.');
    return;
  }
  let category = 'other';
  if (file.type.startsWith('image/')) category = 'image';
  else if (file.type.startsWith('video/')) category = 'video';
  else if (file.type.startsWith('audio/')) category = 'audio';

  pendingFile = { file, category };
  modalCaption.value = '';
  autoResize(modalCaption);

  const url = URL.createObjectURL(file);
  if (category === 'image') modalPreview.innerHTML = `<img src="${url}" alt="preview">`;
  else if (category === 'video') modalPreview.innerHTML = `<video src="${url}" controls></video>`;
  else if (category === 'audio') modalPreview.innerHTML = `<audio src="${url}" controls></audio>`;
  else modalPreview.innerHTML = `<div class="file-chip">📎 ${escapeHTML(file.name)}</div>`;

  fileModalOverlay.classList.remove('hidden');
}

function closeFileModal() {
  fileModalOverlay.classList.add('hidden');
  pendingFile = null;
  modalPreview.innerHTML = '';
  modalCaption.value = '';
}

// ICE servers: STUN alone fails on strict NATs / CGNAT (very common on
// home/mobile connections). Adding a public TURN relay as a fallback means
// the connection can still succeed by relaying traffic instead of silently
// timing out and showing "room not found" on a room that actually existed.
const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ]
};

function initPeer(id) {
  return new Promise((resolve, reject) => {
    const p = new Peer(id, { config: ICE_CONFIG });
    let settled = false;
    p.on('open', () => { settled = true; resolve(p); });
    p.on('error', (err) => { if (!settled) { settled = true; reject(err); } });
  });
}

function attachPeerLifecycle(p) {
  // Keeps the underlying connection to the signaling server alive even if
  // it drops briefly (sleep/wake, wifi blip), instead of leaving the peer
  // in a dead state that looks "connected" but can never receive anyone.
  p.on('disconnected', () => {
    if (p.destroyed) return;
    setStatus('reconnecting...', null);
    p.reconnect();
  });
  p.on('error', (err) => {
    console.warn('peer error:', err && err.type, err);
  });
}

// Auto-Host
async function startHost() {
  myRoomCode = randomCode();
  myCodeEl.textContent = myRoomCode;
  setStatus('opening room...', null);

  try {
    peer = await initPeer(PEER_PREFIX + myRoomCode);
  } catch (err) {
    if (err && err.type === 'unavailable-id') {
      // Extremely rare code collision — silently mint a new one and retry.
      return startHost();
    }
    setStatus('could not open room (network issue) — refresh to try again', 'error');
    return;
  }

  attachPeerLifecycle(peer);
  setStatus('waiting for someone to join with code ' + myRoomCode, 'ok');

  peer.on('connection', (c) => {
    if (conn && conn.open) {
      // Someone already in the room — reject extra joiners instead of
      // silently swapping the active connection out from under the chat.
      c.on('open', () => {
        try { c.send({ type: 'system', text: 'this room is already full' }); } catch (e) {}
        setTimeout(() => c.close(), 300);
      });
      return;
    }
    conn = c;
    // IMPORTANT: wait for the connection to actually be open before treating
    // it as connected. Reacting to peer.on('connection') alone means the
    // handshake hasn't finished yet — that's what caused "connected" to show
    // while sending silently did nothing.
    conn.on('open', () => setupConnection());
    conn.on('error', (err) => {
      console.warn('connection error:', err);
      setStatus('connection error, ask them to rejoin', 'error');
    });
  });
}

startHost();

copyBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  navigator.clipboard.writeText(myRoomCode).then(() => {
    copyBtn.textContent = 'copied';
    setTimeout(() => copyBtn.textContent = 'copy', 1200);
  });
});

joinBtn.addEventListener('click', async () => {
  const code = joinInput.value.trim().toUpperCase();
  if (!code) { setStatus('enter a code first', 'error'); return; }
  joinBtn.disabled = true;
  setStatus('connecting...', null);

  try {
    if (peer) peer.destroy();
    peer = await initPeer(PEER_PREFIX + randomCode(8));
  } catch (err) {
    setStatus('connection failed (network issue), try again', 'error');
    joinBtn.disabled = false;
    return;
  }

  myRoomCode = code;
  conn = peer.connect(PEER_PREFIX + code, { reliable: true });

  let settled = false;
  const fail = (message) => {
    if (settled) return;
    settled = true;
    clearTimeout(timeoutId);
    setStatus(message, 'error');
    joinBtn.disabled = false;
    if (conn) { try { conn.close(); } catch (e) {} }
  };

  // Fallback timeout for cases where neither an explicit error nor an open
  // event ever fires (e.g. connection hangs mid-handshake).
  const timeoutId = setTimeout(() => fail('no room found with that code'), 10000);

  conn.on('open', () => {
    if (settled) return;
    settled = true;
    clearTimeout(timeoutId);
    setupConnection();
  });

  conn.on('error', (err) => {
    console.warn('connection error:', err);
    fail('could not connect, check the code');
  });

  // PeerJS reports a nonexistent room as a peer-level 'peer-unavailable'
  // error, not a connection-level one — catching it here means the joiner
  // gets an accurate "no room found" almost instantly instead of waiting
  // out the full timeout.
  peer.on('error', (err) => {
    if (err && err.type === 'peer-unavailable') {
      fail('no room found with that code');
    }
  });

  attachPeerLifecycle(peer);
});

joinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click(); });

let connectionEstablished = false;

function setupConnection() {
  if (connectionEstablished) return; // guard against double-invocation
  connectionEstablished = true;

  conn.on('data', handleIncomingData);
  conn.on('close', () => {
    connDot.classList.remove('live');
    addSystemMessage('the other person left');
    msgInput.disabled = true;
    sendBtn.disabled = true;
    attachBtn.disabled = true;
    clearReplyTarget();
    closeFileModal();
  });
  conn.on('error', (err) => {
    console.warn('connection error after setup:', err);
  });

  roomLabel.textContent = myRoomCode;
  entryScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  connDot.classList.add('live');
  msgInput.disabled = false;
  sendBtn.disabled = false;
  attachBtn.disabled = false;
  addSystemMessage('connected');
  msgInput.focus();
}

function handleIncomingData(data) {
  if (data.type === 'typing') {
    if (data.state) {
      typingIndicator.classList.remove('hidden');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else {
      typingIndicator.classList.add('hidden');
    }
  } else if (data.type === 'chat' || data.type === 'file') {
    typingIndicator.classList.add('hidden');
    addMessage(data, 'them');
    playSoftBeep();
  } else if (data.type === 'reaction') {
    toggleReaction(data.msgId, data.emoji, 'them', false);
  } else if (data.type === 'system') {
    addSystemMessage(data.text);
  } else {
    // Backwards compatibility
    typingIndicator.classList.add('hidden');
    addMessage({ type: 'chat', id: uid(), text: data }, 'them');
    playSoftBeep();
  }
}

function addSystemMessage(text) {
  const container = document.createElement('div');
  container.className = 'msg-container system';
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg system';
  msgDiv.textContent = text;
  container.appendChild(msgDiv);
  messagesEl.insertBefore(container, typingIndicator);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(dataObj, who) {
  const now = new Date();
  const currentMin = now.getMinutes();
  const msgId = dataObj.id || (dataObj.id = uid()); // backwards-compat if id ever missing

  const container = document.createElement('div');
  container.className = 'msg-container ' + who;
  container.dataset.msgId = msgId;

  // Timestamps
  if (currentMin !== lastMsgMinute) {
    const timeDiv = document.createElement('div');
    timeDiv.className = 'timestamp';
    timeDiv.textContent = now.getHours().toString().padStart(2, '0') + ':' + currentMin.toString().padStart(2, '0');
    container.appendChild(timeDiv);
    lastMsgMinute = currentMin;
  }

  const bubbleRow = document.createElement('div');
  bubbleRow.className = 'bubble-row';

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + who;

  let innerHTML = '';
  if (dataObj.replyTo) {
    const safeSnippet = escapeHTML(dataObj.replyTo.snippet || '');
    innerHTML += `<div class="reply-quote" data-target-id="${dataObj.replyTo.id}">↩ ${dataObj.replyTo.who === 'me' ? 'you' : 'them'}: ${safeSnippet}</div>`;
  }

  if (dataObj.type === 'file') {
    if (dataObj.category === 'image') {
      innerHTML += `<img src="${dataObj.data}" alt="Shared image">`;
    } else if (dataObj.category === 'video') {
      innerHTML += `<video src="${dataObj.data}" controls></video>`;
    } else if (dataObj.category === 'audio') {
      innerHTML += `<audio src="${dataObj.data}" controls></audio>`;
    } else {
      innerHTML += `📎 <a href="${dataObj.data}" download="${dataObj.name}">Download: ${escapeHTML(dataObj.name)}</a>`;
    }
    if (dataObj.caption) {
      innerHTML += `<div class="file-caption">${parseMarkdown(dataObj.caption)}</div>`;
    }
  } else {
    innerHTML += parseMarkdown(dataObj.text || '');
  }
  msgDiv.innerHTML = innerHTML;

  const replyQuoteEl = msgDiv.querySelector('.reply-quote');
  if (replyQuoteEl) {
    replyQuoteEl.addEventListener('click', () => jumpToMessage(replyQuoteEl.dataset.targetId));
  }

  // Reply / react actions
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = `
    <button class="action-reply" title="reply">↩</button>
    <div class="react-wrap">
      <button class="action-react" title="react">🙂</button>
      <div class="emoji-picker">${REACT_EMOJIS.map(e => `<button data-emoji="${e}">${e}</button>`).join('')}</div>
    </div>
  `;

  const replySnippet = dataObj.type === 'file' ? labelForFile(dataObj.category) : truncate(dataObj.text || '', 80);
  actions.querySelector('.action-reply').addEventListener('click', (e) => {
    e.stopPropagation();
    setReplyTarget(msgId, who, replySnippet);
  });
  const reactBtn = actions.querySelector('.action-react');
  const picker = actions.querySelector('.emoji-picker');
  reactBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = picker.classList.contains('open');
    closeAllPickers();
    if (!isOpen) picker.classList.add('open');
  });
  picker.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReaction(msgId, btn.dataset.emoji, 'me');
      picker.classList.remove('open');
    });
  });

  if (who === 'me') {
    bubbleRow.appendChild(actions);
    bubbleRow.appendChild(msgDiv);
  } else {
    bubbleRow.appendChild(msgDiv);
    bubbleRow.appendChild(actions);
  }
  container.appendChild(bubbleRow);

  const reactionsEl = document.createElement('div');
  reactionsEl.className = 'msg-reactions';
  container.appendChild(reactionsEl);

  messageRegistry.set(msgId, { container, reactions: {}, reactionsEl });

  messagesEl.insertBefore(container, typingIndicator);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  if (!conn || !conn.open) {
    addSystemMessage('not connected — message not sent');
    return;
  }

  const payload = { type: 'chat', id: uid(), text: text };
  if (replyTarget) payload.replyTo = { ...replyTarget };

  try {
    conn.send(payload);
  } catch (err) {
    addSystemMessage('failed to send — connection dropped');
    return;
  }
  addMessage(payload, 'me');

  msgInput.value = '';
  autoResize(msgInput);
  clearReplyTarget();
  try { conn.send({ type: 'typing', state: false }); } catch (e) {}
}

// Typing Events + auto-growing textarea
msgInput.addEventListener('input', () => {
  autoResize(msgInput);
  if (!conn || !conn.open) return;
  conn.send({ type: 'typing', state: true });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    conn.send({ type: 'typing', state: false });
  }, 1500);
});

// Enter sends, Shift+Enter inserts a newline
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Pasting an attachment (image/file) straight into the chatbox
msgInput.addEventListener('paste', (e) => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.kind === 'file') {
      const file = item.getAsFile();
      if (file) {
        if (!conn || !conn.open) {
          addSystemMessage('not connected — file not sent');
          return;
        }
        e.preventDefault();
        openFileModal(file);
        return;
      }
    }
  }
});

// File Sharing — pick a file, preview it in a modal, then send
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  fileInput.value = ''; // reset immediately, pendingFile keeps the reference
  if (!file) return;
  if (!conn || !conn.open) {
    addSystemMessage('not connected — file not sent');
    return;
  }
  openFileModal(file);
});

modalCaption.addEventListener('input', () => autoResize(modalCaption));
modalCaption.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) e.preventDefault();
});

modalCancelBtn.addEventListener('click', closeFileModal);

modalSendBtn.addEventListener('click', () => {
  if (!pendingFile) return;
  if (!conn || !conn.open) {
    addSystemMessage('not connected — file not sent');
    closeFileModal();
    return;
  }
  modalSendBtn.disabled = true;
  const { file, category } = pendingFile;
  const reader = new FileReader();
  reader.onload = (e) => {
    const payload = { type: 'file', id: uid(), name: file.name, category, data: e.target.result };
    const caption = modalCaption.value.trim();
    if (caption) payload.caption = caption;
    if (replyTarget) payload.replyTo = { ...replyTarget };
    try {
      conn.send(payload);
    } catch (err) {
      addSystemMessage('failed to send file — connection dropped');
      modalSendBtn.disabled = false;
      return;
    }
    addMessage(payload, 'me');
    clearReplyTarget();
    modalSendBtn.disabled = false;
    closeFileModal();
  };
  reader.onerror = () => {
    addSystemMessage('failed to read file');
    modalSendBtn.disabled = false;
  };
  reader.readAsDataURL(file);
});

replyBarClose.addEventListener('click', clearReplyTarget);

sendBtn.addEventListener('click', sendMessage);

leaveBtn.addEventListener('click', () => {
  if (conn) conn.close();
  if (peer) peer.destroy();
  window.location.reload();
});
</script>
